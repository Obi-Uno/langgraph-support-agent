services:
  - type: web
    name: support-agent-demo
    env: docker
    plan: free
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./support_agent.db
      - key: N8N_WEBHOOK_SECRET
        sync: false
      - key: ESCALATION_REFUND_THRESHOLD
        value: "500"
