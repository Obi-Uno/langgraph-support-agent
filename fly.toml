# Alternative to render.yaml if you deploy on Fly.io instead of Render.
# Run: fly launch --no-deploy   (then fly deploy)
app = "support-agent-demo"
primary_region = "bom"  # Mumbai region -- lowest latency if you're in India

[build]

[env]
  PORT = "8000"
  AGENT_MODEL = "claude-haiku-4-5-20251001"
  DATABASE_URL = "sqlite:///./support_agent.db"
  ESCALATION_REFUND_THRESHOLD = "500"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
